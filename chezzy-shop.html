<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chezzy Shop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.383.0/umd/lucide.min.js"></script>
<style>
  :root{
    --ink:#0F1115;
    --ink-soft:#1B1E26;
    --paper:#FFFFFF;
    --paper-warm:#F7F5F2;
    --cheddar:#FFC93C;
    --cheddar-deep:#E6A800;
    --flash:#FF5470;
    --mint:#2FBE83;
    --violet:#6B5BFF;
    --line:#E7E3DC;
    --line-dark:#2A2E38;
    --muted:#6B7280;
    --radius:14px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    font-family:'Inter',sans-serif;
    color:var(--ink);
    background:var(--paper-warm);
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,h4,.display{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    letter-spacing:-0.02em;
    line-height:1.05;
  }
  .mono{font-family:'JetBrains Mono',monospace;}
  a{color:inherit;text-decoration:none;}
  button{font-family:inherit;cursor:pointer;border:none;}
  img{display:block;max-width:100%;}
  :focus-visible{outline:3px solid var(--violet);outline-offset:2px;}

  /* Layout helpers */
  .wrap{max-width:1280px;margin:0 auto;padding:0 24px;}
  .skip-link{position:absolute;left:-9999px;}
  .skip-link:focus{left:8px;top:8px;background:var(--ink);color:#fff;padding:8px 14px;border-radius:8px;z-index:999;}

  /* ---------- TOPBAR ---------- */
  .topbar{background:var(--ink);color:#fff;font-size:13px;}
  .topbar .wrap{display:flex;justify-content:space-between;align-items:center;height:36px;}
  .topbar a{opacity:.8;transition:opacity .15s;}
  .topbar a:hover{opacity:1;}
  .topbar .left{display:flex;gap:18px;align-items:center;}
  .topbar .right{display:flex;gap:16px;}
  @media (max-width:720px){ .topbar .left span:last-child{display:none;} }

  /* ---------- HEADER ---------- */
  header.site{
    background:var(--paper);
    border-bottom:2px solid var(--ink);
    position:sticky;top:0;z-index:100;
  }
  header.site .wrap{display:flex;align-items:center;gap:28px;height:76px;}
  .logo{display:flex;align-items:center;gap:10px;flex-shrink:0;}
  .logo-mark{
    width:40px;height:40px;background:var(--cheddar);
    border:2px solid var(--ink);border-radius:8px;
    display:flex;align-items:center;justify-content:center;
    font-family:'Space Grotesk';font-weight:800;font-size:20px;
    transform:rotate(-6deg);
  }
  .logo-text{font-size:22px;font-weight:800;}
  .logo-text span{color:var(--flash);}

  nav.main-nav{display:flex;gap:28px;font-weight:600;font-size:15px;flex:1;}
  nav.main-nav a{position:relative;padding:6px 0;}
  nav.main-nav a.active{color:var(--flash);}
  nav.main-nav a::after{
    content:'';position:absolute;left:0;bottom:0;height:3px;width:0;
    background:var(--cheddar);transition:width .2s;
  }
  nav.main-nav a:hover::after{width:100%;}

  .search-bar{
    flex:1;max-width:420px;display:flex;align-items:center;
    border:2px solid var(--ink);border-radius:999px;padding:8px 16px;gap:10px;
    background:var(--paper-warm);
  }
  .search-bar input{flex:1;border:none;background:none;font-size:14px;outline:none;font-family:inherit;}
  .header-icons{display:flex;gap:10px;align-items:center;}
  .icon-btn{
    width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;
    border:2px solid var(--ink);background:var(--paper);position:relative;transition:transform .15s, background .15s;
  }
  .icon-btn:hover{background:var(--cheddar);transform:translateY(-2px);}
  .badge{
    position:absolute;top:-8px;right:-8px;background:var(--flash);color:#fff;
    font-size:11px;font-weight:700;border-radius:999px;min-width:20px;height:20px;
    display:flex;align-items:center;justify-content:center;border:2px solid var(--paper);padding:0 4px;
  }
  .nav-toggle{display:none;}
  @media (max-width:980px){
    nav.main-nav, .search-bar{display:none;}
    .nav-toggle{display:flex;}
  }

  /* ---------- BUTTONS ---------- */
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    padding:14px 28px;border-radius:999px;font-weight:700;font-size:15px;
    border:2px solid var(--ink);transition:transform .15s, box-shadow .15s, background .15s;
    white-space:nowrap;
  }
  .btn:active{transform:translateY(1px);}
  .btn-primary{background:var(--cheddar);color:var(--ink);box-shadow:4px 4px 0 var(--ink);}
  .btn-primary:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--ink);}
  .btn-dark{background:var(--ink);color:#fff;box-shadow:4px 4px 0 var(--cheddar);}
  .btn-dark:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--cheddar);}
  .btn-outline{background:transparent;color:var(--ink);}
  .btn-outline:hover{background:var(--ink);color:#fff;}
  .btn-ghost{background:var(--paper);color:var(--ink);box-shadow:none;}
  .btn-ghost:hover{background:var(--paper-warm);}
  .btn-flash{background:var(--flash);color:#fff;border-color:var(--ink);box-shadow:4px 4px 0 var(--ink);}
  .btn-flash:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--ink);}
  .btn-sm{padding:9px 18px;font-size:13px;box-shadow:3px 3px 0 var(--ink);}
  .btn-block{width:100%;}
  .btn[disabled]{opacity:.45;cursor:not-allowed;box-shadow:none !important;transform:none !important;}

  /* ---------- HERO ---------- */
  .hero{
    background:var(--ink);color:#fff;position:relative;overflow:hidden;
    padding:64px 0 0;
  }
  .hero .wrap{display:grid;grid-template-columns:1.1fr 1fr;gap:48px;align-items:center;}
  .hero-eyebrow{
    display:inline-flex;align-items:center;gap:8px;background:var(--cheddar);color:var(--ink);
    font-family:'JetBrains Mono';font-weight:700;font-size:12px;letter-spacing:.08em;
    padding:6px 14px;border-radius:999px;text-transform:uppercase;margin-bottom:20px;
  }
  .hero h1{font-size:clamp(40px,6vw,68px);}
  .hero h1 .hl{color:var(--cheddar);}
  .hero h1 .hl2{color:var(--flash);}
  .hero p.lead{font-size:18px;color:#C7CAD3;margin:20px 0 32px;max-width:460px;}
  .hero-ctas{display:flex;gap:14px;flex-wrap:wrap;}

  .hero-visual{position:relative;height:480px;}
  .price-tag{
    position:absolute;background:var(--paper);border:2px solid var(--ink);border-radius:12px;
    padding:18px 20px;box-shadow:6px 6px 0 rgba(0,0,0,.35);color:var(--ink);
  }
  .price-tag::before{
    content:'';position:absolute;width:14px;height:14px;background:var(--ink);border-radius:50%;
    top:50%;left:-7px;transform:translateY(-50%);
  }
  .price-tag .ptag-name{font-size:13px;font-weight:600;color:var(--muted);margin-bottom:4px;}
  .price-tag .ptag-price{font-family:'JetBrains Mono';font-weight:700;font-size:22px;}
  .tag-1{top:6%;right:8%;transform:rotate(6deg);width:200px;background:var(--cheddar);}
  .tag-2{top:42%;left:0%;transform:rotate(-4deg);width:210px;}
  .tag-3{bottom:6%;right:14%;transform:rotate(4deg);width:190px;background:var(--mint);color:var(--ink);}
  .hero-blob{
    position:absolute;width:340px;height:340px;border-radius:50%;
    background:radial-gradient(circle at 30% 30%, var(--violet), transparent 70%);
    opacity:.35;top:10%;left:30%;filter:blur(10px);
  }
  @media (max-width:900px){
    .hero .wrap{grid-template-columns:1fr;}
    .hero-visual{height:340px;margin-top:20px;}
    .price-tag{transform:none !important;}
    .tag-1{top:0;right:0;width:170px;}
    .tag-2{top:38%;left:0;width:180px;}
    .tag-3{bottom:0;right:10%;width:160px;}
  }

  /* ---------- SECTIONS ---------- */
  section{padding:72px 0;}
  .section-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:32px;gap:20px;flex-wrap:wrap;}
  .section-head h2{font-size:clamp(28px,4vw,40px);}
  .section-head .sub{color:var(--muted);font-size:15px;margin-top:6px;}
  .eyebrow{
    font-family:'JetBrains Mono';font-size:12px;font-weight:700;letter-spacing:.12em;
    text-transform:uppercase;color:var(--flash);margin-bottom:10px;display:block;
  }

  /* ---------- CATEGORY TAGS ---------- */
  .cat-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:20px;}
  @media (max-width:980px){.cat-grid{grid-template-columns:repeat(3,1fr);}}
  @media (max-width:560px){.cat-grid{grid-template-columns:repeat(2,1fr);}}
  .cat-card{
    background:var(--paper);border:2px solid var(--ink);border-radius:var(--radius);
    padding:24px 16px;text-align:center;cursor:pointer;
    transition:transform .18s, box-shadow .18s, background .18s;
    box-shadow:4px 4px 0 var(--ink);
  }
  .cat-card:hover{transform:rotate(-2deg) translateY(-4px);box-shadow:6px 8px 0 var(--ink);background:var(--cheddar);}
  .cat-card .ic{font-size:30px;margin-bottom:10px;display:block;}
  .cat-card .name{font-weight:700;font-size:14px;}

  /* ---------- PRODUCT CARD ---------- */
  .product-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;}
  @media (max-width:1100px){.product-grid{grid-template-columns:repeat(3,1fr);}}
  @media (max-width:760px){.product-grid{grid-template-columns:repeat(2,1fr);}}
  @media (max-width:460px){.product-grid{grid-template-columns:1fr;}}
  .pcard{
    background:var(--paper);border:2px solid var(--ink);border-radius:var(--radius);
    overflow:hidden;display:flex;flex-direction:column;transition:transform .18s, box-shadow .18s;
    box-shadow:4px 4px 0 transparent;
  }
  .pcard:hover{transform:translateY(-4px);box-shadow:5px 6px 0 var(--ink);}
  .pcard-img{
    aspect-ratio:1/1;background:var(--paper-warm);position:relative;display:flex;align-items:center;justify-content:center;
    border-bottom:2px solid var(--ink);overflow:hidden;
  }
  .pcard-img .ic{font-size:54px;}
  .pcard-badge{
    position:absolute;top:10px;left:10px;background:var(--flash);color:#fff;
    font-family:'JetBrains Mono';font-weight:700;font-size:11px;padding:4px 10px;border-radius:999px;
  }
  .pcard-badge.new{background:var(--mint);color:var(--ink);}
  .pcard-badge.hot{background:var(--violet);color:#fff;}
  .pcard-wish{
    position:absolute;top:10px;right:10px;width:34px;height:34px;border-radius:50%;
    background:#fff;border:2px solid var(--ink);display:flex;align-items:center;justify-content:center;
    transition:background .15s;
  }
  .pcard-wish:hover{background:var(--cheddar);}
  .pcard-body{padding:16px;display:flex;flex-direction:column;gap:8px;flex:1;}
  .pcard-cat{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.06em;}
  .pcard-name{font-weight:700;font-size:15px;line-height:1.3;}
  .pcard-rating{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);}
  .pcard-rating .stars{color:var(--cheddar-deep);}
  .pcard-prices{display:flex;align-items:baseline;gap:8px;margin-top:auto;}
  .pcard-price{font-family:'JetBrains Mono';font-weight:700;font-size:18px;}
  .pcard-old{font-family:'JetBrains Mono';font-size:13px;color:var(--muted);text-decoration:line-through;}
  .pcard-actions{display:flex;gap:8px;padding:0 16px 16px;}
  .pcard-actions .btn{flex:1;padding:10px;font-size:13px;}

  /* ---------- TABS ---------- */
  .tabs-row{display:flex;gap:10px;flex-wrap:wrap;}
  .tab-btn{
    padding:10px 20px;border-radius:999px;border:2px solid var(--ink);background:var(--paper);
    font-weight:700;font-size:13px;transition:.15s;
  }
  .tab-btn.active{background:var(--ink);color:#fff;}
  .tab-btn:hover:not(.active){background:var(--paper-warm);}

  /* ---------- FLASH DEALS BAND ---------- */
  .flash-band{background:var(--ink);color:#fff;}
  .flash-band .section-head h2{color:#fff;}
  .flash-band .section-head .sub{color:#9CA1AE;}
  .countdown{display:flex;gap:10px;}
  .countdown .cell{
    background:var(--flash);border:2px solid #fff;border-radius:10px;
    padding:8px 12px;text-align:center;min-width:58px;
  }
  .countdown .cell .num{font-family:'JetBrains Mono';font-size:20px;font-weight:700;}
  .countdown .cell .lab{font-size:10px;letter-spacing:.08em;text-transform:uppercase;opacity:.8;}
  .flash-band .pcard{background:var(--ink-soft);border-color:var(--line-dark);color:#fff;}
  .flash-band .pcard-img{background:#262B36;border-color:var(--line-dark);}
  .flash-band .pcard-cat{color:#9CA1AE;}
  .flash-band .pcard-wish{background:var(--ink-soft);border-color:var(--line-dark);}
  .flash-band .pcard:hover{box-shadow:5px 6px 0 var(--cheddar);}

  /* ---------- WHY CHOOSE US ---------- */
  .why-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;}
  @media (max-width:900px){.why-grid{grid-template-columns:repeat(2,1fr);}}
  @media (max-width:520px){.why-grid{grid-template-columns:1fr;}}
  .why-card{
    background:var(--paper);border:2px solid var(--ink);border-radius:var(--radius);
    padding:28px 22px;text-align:left;
  }
  .why-card .ic-wrap{
    width:52px;height:52px;border-radius:12px;background:var(--cheddar);border:2px solid var(--ink);
    display:flex;align-items:center;justify-content:center;margin-bottom:16px;
  }
  .why-card h3{font-size:17px;margin-bottom:6px;}
  .why-card p{font-size:14px;color:var(--muted);line-height:1.5;}

  /* ---------- TESTIMONIALS ---------- */
  .testi-track{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;}
  @media (max-width:900px){.testi-track{grid-template-columns:1fr;}}
  .testi-card{
    background:var(--paper);border:2px solid var(--ink);border-radius:var(--radius);
    padding:24px;display:flex;flex-direction:column;gap:14px;
  }
  .testi-stars{color:var(--cheddar-deep);font-size:14px;}
  .testi-quote{font-size:15px;line-height:1.6;color:var(--ink);}
  .testi-person{display:flex;align-items:center;gap:12px;margin-top:auto;}
  .testi-avatar{
    width:40px;height:40px;border-radius:50%;background:var(--violet);color:#fff;
    display:flex;align-items:center;justify-content:center;font-weight:700;font-family:'Space Grotesk';
  }
  .testi-name{font-weight:700;font-size:14px;}
  .testi-role{font-size:12px;color:var(--muted);}

  /* ---------- NEWSLETTER ---------- */
  .newsletter{
    background:var(--cheddar);border:2px solid var(--ink);border-radius:24px;
    padding:48px;display:flex;justify-content:space-between;align-items:center;gap:32px;flex-wrap:wrap;
    box-shadow:8px 8px 0 var(--ink);
  }
  .newsletter h2{font-size:clamp(24px,4vw,34px);max-width:420px;}
  .newsletter p{margin-top:8px;color:var(--ink-soft);font-size:15px;}
  .newsletter-form{display:flex;gap:10px;flex:1;max-width:440px;min-width:260px;}
  .newsletter-form input{
    flex:1;padding:14px 18px;border-radius:999px;border:2px solid var(--ink);font-family:inherit;font-size:14px;outline:none;
  }

  /* ---------- FOOTER ---------- */
  footer.site{background:var(--ink);color:#C7CAD3;padding:64px 0 0;margin-top:40px;}
  .footer-grid{display:grid;grid-template-columns:1.4fr 1fr 1fr 1.2fr;gap:40px;padding-bottom:48px;border-bottom:1px solid var(--line-dark);}
  @media (max-width:900px){.footer-grid{grid-template-columns:repeat(2,1fr);}}
  @media (max-width:560px){.footer-grid{grid-template-columns:1fr;}}
  .footer-grid h4{color:#fff;font-size:14px;margin-bottom:16px;text-transform:uppercase;letter-spacing:.08em;font-family:'JetBrains Mono';}
  .footer-grid ul{list-style:none;display:flex;flex-direction:column;gap:10px;font-size:14px;}
  .footer-grid ul a:hover{color:var(--cheddar);}
  .footer-brand p{font-size:14px;line-height:1.6;margin:14px 0 18px;max-width:280px;}
  .footer-contact{display:flex;flex-direction:column;gap:10px;font-size:14px;}
  .footer-contact a{display:flex;align-items:center;gap:8px;}
  .footer-contact a:hover{color:var(--cheddar);}
  .social-row{display:flex;gap:10px;margin-top:16px;}
  .social-row a{
    width:38px;height:38px;border-radius:10px;border:1px solid var(--line-dark);
    display:flex;align-items:center;justify-content:center;transition:.15s;
  }
  .social-row a:hover{background:var(--cheddar);color:var(--ink);border-color:var(--cheddar);}
  .footer-bottom{padding:24px 0;display:flex;justify-content:space-between;align-items:center;font-size:13px;color:#7E8494;flex-wrap:wrap;gap:10px;}

  /* ---------- BREADCRUMB / PAGE HEADER ---------- */
  .page-header{background:var(--ink);color:#fff;padding:36px 0;}
  .page-header h1{font-size:clamp(28px,4vw,40px);}
  .crumbs{font-size:13px;color:#9CA1AE;margin-top:8px;font-family:'JetBrains Mono';}
  .crumbs a:hover{color:var(--cheddar);}

  /* ---------- SHOP PAGE ---------- */
  .shop-layout{display:grid;grid-template-columns:260px 1fr;gap:32px;align-items:flex-start;}
  @media (max-width:880px){.shop-layout{grid-template-columns:1fr;}}
  .filter-panel{
    background:var(--paper);border:2px solid var(--ink);border-radius:var(--radius);
    padding:22px;position:sticky;top:96px;
  }
  .filter-block{padding:18px 0;border-bottom:1px solid var(--line);}
  .filter-block:first-child{padding-top:0;}
  .filter-block:last-child{border-bottom:none;padding-bottom:0;}
  .filter-block h4{font-size:13px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;font-family:'JetBrains Mono';}
  .filter-row{display:flex;align-items:center;gap:10px;font-size:14px;padding:5px 0;cursor:pointer;}
  .filter-row input{width:16px;height:16px;accent-color:var(--flash);}
  .range-row{display:flex;align-items:center;gap:10px;}
  .range-row input[type=range]{flex:1;accent-color:var(--flash);}
  .range-val{font-family:'JetBrains Mono';font-size:13px;font-weight:700;}
  .star-row{color:var(--cheddar-deep);font-size:14px;}

  .shop-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;gap:16px;flex-wrap:wrap;}
  .shop-toolbar .count{font-size:14px;color:var(--muted);}
  .select-box{
    border:2px solid var(--ink);border-radius:999px;padding:10px 18px;font-weight:700;font-size:13px;
    background:var(--paper);display:flex;align-items:center;gap:8px;
  }
  .select-box select{border:none;background:none;font-family:inherit;font-weight:700;font-size:13px;outline:none;}

  .pagination{display:flex;justify-content:center;gap:8px;margin-top:48px;}
  .page-btn{
    width:40px;height:40px;border-radius:10px;border:2px solid var(--ink);background:var(--paper);
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;transition:.15s;
  }
  .page-btn.active{background:var(--ink);color:#fff;}
  .page-btn:hover:not(.active){background:var(--cheddar);}

  /* ---------- PRODUCT PAGE ---------- */
  .product-layout{display:grid;grid-template-columns:1fr 1fr;gap:48px;}
  @media (max-width:880px){.product-layout{grid-template-columns:1fr;}}
  .gallery-main{
    aspect-ratio:1/1;background:var(--paper);border:2px solid var(--ink);border-radius:var(--radius);
    display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;cursor:zoom-in;
    margin-bottom:14px;
  }
  .gallery-main .ic{font-size:120px;transition:transform .3s;}
  .gallery-main:hover .ic{transform:scale(1.15);}
  .zoom-pill{
    position:absolute;bottom:14px;right:14px;background:var(--ink);color:#fff;font-size:12px;
    font-weight:700;padding:6px 14px;border-radius:999px;display:flex;align-items:center;gap:6px;
  }
  .gallery-thumbs{display:flex;gap:10px;}
  .gthumb{
    width:72px;height:72px;border-radius:10px;border:2px solid var(--line);background:var(--paper);
    display:flex;align-items:center;justify-content:center;font-size:26px;cursor:pointer;transition:.15s;
  }
  .gthumb.active{border-color:var(--ink);background:var(--cheddar);}

  .pp-cat{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--flash);font-family:'JetBrains Mono';}
  .pp-title{font-size:clamp(26px,4vw,36px);margin:8px 0 10px;}
  .pp-rating{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--muted);margin-bottom:16px;}

/* ============== ICON HELPER ============== */
function Icon({ name, size = 18, ...rest }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && window.lucide) {
      ref.current.innerHTML = '';
      const el = window.lucide.createElement(window.lucide.icons[toPascal(name)]);
      if (el) ref.current.appendChild(el);
      const svg = ref.current.querySelector('svg');
      if (svg){ svg.setAttribute('width', size); svg.setAttribute('height', size); svg.setAttribute('aria-hidden','true'); }
    }
  }, [name, size]);
  function toPascal(s){
    return s.split('-').map(w=>w[0].toUpperCase()+w.slice(1)).join('').replace(/(\d)([a-z])/g, (m,a,b)=>a+b.toUpperCase());
  }
  return <span ref={ref} style={{display:'inline-flex',lineHeight:0}} {...rest}></span>;
}

function ShopPage({ onAddCart, onToggleWish, wishlist, onView, catFilter, setCatFilter }) {
  const [search, setSearch] = useState('');
  const [sort, setSort] = useState('featured');
  const [price, setPrice] = useState(20000);
  const [selectedCats, setSelectedCats] = useState(catFilter ? [catFilter] : []);
  const [selectedBrands, setSelectedBrands] = useState([]);
  const [minRating, setMinRating] = useState(0);
  const [page, setPage] = useState(1);
  const PER_PAGE = 8;

  useEffect(() => {
    if (catFilter) { setSelectedCats([catFilter]); setCatFilter(null); }
  }, []);

  const brands = useMemo(()=>[...new Set(PRODUCTS.map(p=>p.brand))], []);

  function toggleCat(name){
    setSelectedCats(s => s.includes(name) ? s.filter(c=>c!==name) : [...s, name]);
    setPage(1);
  }
  function toggleBrand(name){
    setSelectedBrands(s => s.includes(name) ? s.filter(c=>c!==name) : [...s, name]);
    setPage(1);
  }

  const filtered = useMemo(() => {
    let list = PRODUCTS.filter(p => {
      if (search && !p.name.toLowerCase().includes(search.toLowerCase())) return false;
      if (selectedCats.length && !selectedCats.includes(p.cat)) return false;
      if (selectedBrands.length && !selectedBrands.includes(p.brand)) return false;
      if (p.price > price) return false;
      if (p.rating < minRating) return false;
      return true;
    });
    if (sort==='price-low') list = [...list].sort((a,b)=>a.price-b.price);
    if (sort==='price-high') list = [...list].sort((a,b)=>b.price-a.price);
    if (sort==='rating') list = [...list].sort((a,b)=>b.rating-a.rating);
    return list;
  }, [search, selectedCats, selectedBrands, price, minRating, sort]);

  const totalPages = Math.max(1, Math.ceil(filtered.length / PER_PAGE));
  const pageItems = filtered.slice((page-1)*PER_PAGE, page*PER_PAGE);

  return (
    <>
      <div className="page-header">
        <div className="wrap">
          <h1>Shop All Products</h1>
          <div className="crumbs"><a href="#">Home</a> / Shop</div>
        </div>
      </div>
      <section>
        <div className="wrap">
          <div className="shop-layout">
            {/* SIDEBAR */}
            <aside className="filter-panel" aria-label="Filters">
              <div className="filter-block">
                <h4>Categories</h4>
                {CATEGORIES.map(c => (
                  <label className="filter-row" key={c.id}>
                    <input type="checkbox" checked={selectedCats.includes(c.name)} onChange={()=>toggleCat(c.name)} />
                    {c.icon} {c.name}
                  </label>
                ))}
              </div>
              <div className="filter-block">
                <h4>Price Range</h4>
                <div className="range-row">
                  <input type="range" min="500" max="20000" step="100" value={price} onChange={e=>{setPrice(Number(e.target.value));setPage(1);}} aria-label="Maximum price"/>
                </div>
                <div className="mt-8 text-muted" style={{fontSize:'13px'}}>Up to <span className="range-val mono">{PKR(price)}</span></div>
              </div>
              <div className="filter-block">
                <h4>Brand</h4>
                {brands.map(b => (
                  <label className="filter-row" key={b}>
                    <input type="checkbox" checked={selectedBrands.includes(b)} onChange={()=>toggleBrand(b)} />
                    {b}
                  </label>
                ))}
              </div>
              <div className="filter-block">
                <h4>Rating</h4>
                {[4,3,2].map(r => (
                  <label className="filter-row" key={r}>
                    <input type="radio" name="rating" checked={minRating===r} onChange={()=>{setMinRating(r);setPage(1);}} />
                    <span className="star-row">{'★'.repeat(r)}{'☆'.repeat(5-r)}</span> & up
                  </label>
                ))}
                <label className="filter-row">
                  <input type="radio" name="rating" checked={minRating===0} onChange={()=>{setMinRating(0);setPage(1);}} />
                  Any rating
                </label>
              </div>
            </aside>

            {/* MAIN */}
            <div>
              <div className="shop-toolbar">
                <form className="search-bar" style={{maxWidth:'320px'}} onSubmit={e=>e.preventDefault()} role="search">
                  <Icon name="search" size={16} />
                  <input type="text" placeholder="Search products..." value={search} onChange={e=>{setSearch(e.target.value);setPage(1);}} aria-label="Search products"/>
                </form>
                <div className="flex-center gap-8" style={{flexWrap:'wrap'}}>
                  <span className="count">{filtered.length} results</span>
                  <div className="select-box">
                    <Icon name="arrow-up-down" size={14}/>
                    <select value={sort} onChange={e=>setSort(e.target.value)} aria-label="Sort by">
                      <option value="featured">Featured</option>
                      <option value="price-low">Price: Low to High</option>
                      <option value="price-high">Price: High to Low</option>
                      <option value="rating">Top Rated</option>
                    </select>
                  </div>
                </div>
              </div>

              {pageItems.length === 0 ? (
                <div className="empty-state">
                  <div className="ic">🔍</div>
                  <h3>No products found</h3>
                  <p>Try adjusting your filters or search terms.</p>
                </div>
              ) : (
                <div className="product-grid">
                  {pageItems.map(p => <ProductCard key={p.id} p={p} onAddCart={onAddCart} onToggleWish={onToggleWish} isWished={wishlist.some(w=>w.id===p.id)} onView={onView}/>)}
                </div>
              )}

              {totalPages > 1 && (
                <div className="pagination" aria-label="Pagination">
                  <button className="page-btn" disabled={page===1} onClick={()=>setPage(p=>p-1)} aria-label="Previous page"><Icon name="chevron-left" size={16}/></button>
                  {Array.from({length: totalPages}).map((_,i)=>(
                    <button key={i} className={`page-btn ${page===i+1?'active':''}`} onClick={()=>setPage(i+1)}>{i+1}</button>
                  ))}
                  <button className="page-btn" disabled={page===totalPages} onClick={()=>setPage(p=>p+1)} aria-label="Next page"><Icon name="chevron-right" size={16}/></button>
                </div>
              )}
            </div>
          </div>
        </div>
      </section>
    </>
  );
}

  const discount = applied ? Math.round(subtotal*applied.pct) : 0;
  const shipping = subtotal > 3000 || subtotal===0 ? 0 : 200;
  const total = subtotal - discount + shipping;

  function applyCoupon(e){
    e.preventDefault();
    if (coupon.trim().toUpperCase()==='CHEZZY10') setApplied({code:'CHEZZY10', pct:0.10});

/* ============== CHECKOUT PAGE ============== */
function CheckoutPage({ cart, navigate, onPlaceOrder }) {
  const [payment, setPayment] = useState('cod');
  const subtotal = cart.reduce((s,i)=>s+i.price*i.qty,0);
  const shipping = subtotal > 3000 || subtotal===0 ? 0 : 200;
  const total = subtotal + shipping;

  const payOptions = [
    { id:'cod', name:'Cash on Delivery', desc:'Pay when your order arrives', ic:'COD' },
    { id:'bank', name:'Bank Transfer', desc:'Transfer to our account & share receipt', ic:'BNK' },
    { id:'jazzcash', name:'JazzCash', desc:'Pay instantly via JazzCash wallet', ic:'JC' },
    { id:'easypaisa', name:'Easypaisa', desc:'Pay instantly via Easypaisa wallet', ic:'EP' },
  ];

  function submit(e){
    e.preventDefault();
    onPlaceOrder();
  }

  return (
    <>
      <div className="page-header">
        <div className="wrap">
          <h1>Checkout</h1>
          <div className="crumbs"><a href="#" onClick={(e)=>{e.preventDefault();navigate('home');}}>Home</a> / <a href="#" onClick={(e)=>{e.preventDefault();navigate('cart');}}>Cart</a> / Checkout</div>
        </div>
      </div>
      <section>
        <div className="wrap">
          <form className="checkout-layout" onSubmit={submit}>
            <div>
              <div className="form-card">
                <h3><span className="step-num">1</span> Customer Details</h3>
                <div className="form-grid">
                  <div className="form-field"><label htmlFor="name">Full Name</label><input id="name" required placeholder="Ali Raza" /></div>
                  <div className="form-field"><label htmlFor="phone">Phone Number</label><input id="phone" required placeholder="03XX-XXXXXXX" /></div>
                  <div className="form-field"><label htmlFor="email">Email Address</label><input id="email" type="email" required placeholder="you@example.com" /></div>
                  <div className="form-field"><label htmlFor="city">City</label><input id="city" required placeholder="Lahore" /></div>
                  <div className="form-field full"><label htmlFor="address">Delivery Address</label><textarea id="address" rows="3" required placeholder="House #, Street, Area, Landmark"></textarea></div>
                </div>
              </div>

              <div className="form-card">
                <h3><span className="step-num">2</span> Payment Method</h3>
                <div className="payment-options">
                  {payOptions.map(o => (
                    <label key={o.id} className={`pay-option ${payment===o.id?'selected':''}`}>
                      <input type="radio" name="payment" checked={payment===o.id} onChange={()=>setPayment(o.id)} />
                      <span className="pay-ic">{o.ic}</span>
                      <span>
                        <div className="pay-name">{o.name}</div>
                        <div className="pay-desc">{o.desc}</div>
                      </span>
                    </label>
                  ))}
                </div>
                {(payment==='jazzcash' || payment==='easypaisa') && (
                  <div className="form-grid mt-8">
                    <div className="form-field full"><label>{payment==='jazzcash'?'JazzCash':'Easypaisa'} Account Number</label><input required placeholder="03XX-XXXXXXX" /></div>
                  </div>
                )}
                {payment==='bank' && (
                  <p className="text-muted mt-8" style={{fontSize:'13px'}}>Account details will be shared via email/WhatsApp after order confirmation.</p>
                )}
              </div>
            </div>

            <div className="order-summary">
              <h3>Order Summary</h3>
              {cart.length===0 && <p className="text-muted" style={{fontSize:'14px'}}>Your cart is empty.</p>}
              {cart.map(item => (
                <div className="summary-row" key={item.id}><span>{item.name} × {item.qty}</span><span className="mono">{PKR(item.price*item.qty)}</span></div>
              ))}
              <div className="summary-row"><span>Subtotal</span><span className="mono">{PKR(subtotal)}</span></div>
              <div className="summary-row"><span>Shipping</span><span className="mono">{shipping===0?'Free':PKR(shipping)}</span></div>
              <div className="summary-row total"><span>Total</span><span>{PKR(total)}</span></div>
              <button className="btn btn-primary btn-block mt-8" type="submit" disabled={cart.length===0}><Icon name="lock" size={16}/> Place Order</button>
            </div>
          </form>
        </div>
      </section>
    </>
  );
}

}

/* ============== APP ROOT ============== */
function App() {
  const [route, setRoute] = useState('home');
  const [activeProduct, setActiveProduct] = useState(PRODUCTS[0]);
  const [cart, setCart] = useState([]);
  const [wishlist, setWishlist] = useState([]);
  const [toast, setToast] = useState(null);
  const [catFilter, setCatFilter] = useState(null);

  function navigate(r){
    setRoute(r);
    window.scrollTo({top:0, behavior:'instant'});
  }

  function showToast(msg){ setToast(msg); }

  function addToCart(product, qty=1){
    setCart(c => {
      const existing = c.find(i=>i.id===product.id);
      if (existing) return c.map(i=>i.id===product.id ? {...i, qty:i.qty+qty} : i);
      return [...c, {...product, qty}];
    });
    showToast(`${product.name} added to cart`);
  }

  function updateQty(id, delta){
    setCart(c => c.map(i => i.id===id ? {...i, qty: Math.max(1, i.qty+delta)} : i));
  }

  function removeItem(id){
    setCart(c => c.filter(i=>i.id!==id));
  }

  function toggleWish(product){
    setWishlist(w => {
      const exists = w.some(i=>i.id===product.id);
      if (exists){ showToast(`Removed from wishlist`); return w.filter(i=>i.id!==product.id); }
      showToast(`Added to wishlist`);
      return [...w, product];
    });
  }

  function viewProduct(product){
    setActiveProduct(product);
    navigate('product');
  }

  function placeOrder(){
    setCart([]);
    showToast('Order placed successfully! 🎉');
    navigate('dashboard');
  }

  const cartCount = cart.reduce((s,i)=>s+i.qty,0);

  let page;
  switch(route){
    case 'home': page = <HomePage navigate={navigate} onAddCart={addToCart} onToggleWish={toggleWish} wishlist={wishlist} onView={viewProduct} setCatFilter={setCatFilter}/>; break;
    case 'shop': page = <ShopPage onAddCart={addToCart} onToggleWish={toggleWish} wishlist={wishlist} onView={viewProduct} catFilter={catFilter} setCatFilter={setCatFilter}/>; break;
    case 'product': page = <ProductPage product={activeProduct} navigate={navigate} onAddCart={addToCart} onToggleWish={toggleWish} isWished={wishlist.some(w=>w.id===activeProduct.id)}/>; break;
    case 'cart': page = <CartPage cart={cart} updateQty={updateQty} removeItem={removeItem} navigate={navigate}/>; break;
    case 'checkout': page = <CheckoutPage cart={cart} navigate={navigate} onPlaceOrder={placeOrder}/>; break;
    case 'dashboard': page = <UserDashboard wishlist={wishlist} onToggleWish={toggleWish} navigate={navigate} onView={viewProduct}/>; break;
    case 'admin': page = <AdminDashboard navigate={navigate}/>; break;
    case 'about': page = <AboutPage navigate={navigate}/>; break;
    case 'contact': page = <ContactPage navigate={navigate}/>; break;
    default: page = <HomePage navigate={navigate} onAddCart={addToCart} onToggleWish={toggleWish} wishlist={wishlist} onView={viewProduct} setCatFilter={setCatFilter}/>;
  }

  return (
    <>
      <Header route={route} navigate={navigate} cartCount={cartCount} wishCount={wishlist.length} />
      <main id="main">{page}</main>
      <Footer navigate={navigate} />
      {toast && <Toast message={toast} onClose={()=>setToast(null)} />}
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
